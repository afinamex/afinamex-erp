<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<title>Dashboard | ERP Afinamex</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
margin:0;
}

header{
background:black;
color:white;
padding:20px;
font-size:22px;
}

.container{
max-width:1000px;
margin:auto;
padding:30px;
}

.cards{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-top:30px;
}

.card{
background:white;
padding:30px;
border-radius:6px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
text-align:center;
}

.card h2{
font-size:40px;
margin:10px 0;
}

.card p{
font-size:18px;
color:#555;
}

.menu{
margin-top:40px;
display:flex;
gap:20px;
}

.menu a{
text-decoration:none;
background:black;
color:white;
padding:12px 20px;
}

.menu a:hover{
background:#333;
}

</style>

</head>

<body>

<header>
ERP AFINAMEX | Panel de Control
</header>

<div class="container">

<h1>Dashboard</h1>

<div class="cards">

<div class="card">
<p>Vehículos registrados</p>
<h2 id="vehiculosTotal">0</h2>
</div>

<div class="card">
<p>Órdenes de trabajo</p>
<h2 id="ordenesTotal">0</h2>
</div>

<div class="card">
<p>Productos en inventario</p>
<h2 id="inventarioTotal">0</h2>
</div>

</div>

<div class="menu">

<a href="vehiculos.html">Vehículos</a>

<a href="ordenes.html">Órdenes</a>

<a href="inventario.html">Inventario</a>

</div>

</div>

<script>

async function cargarDashboard(){

const vehiculos = await fetch("http://localhost:3000/vehiculos")
const ordenes = await fetch("http://localhost:3000/ordenes")
const inventario = await fetch("http://localhost:3000/inventario")

const v = await vehiculos.json()
const o = await ordenes.json()
const i = await inventario.json()

document.getElementById("vehiculosTotal").innerText = v.length
document.getElementById("ordenesTotal").innerText = o.length
document.getElementById("inventarioTotal").innerText = i.length

}

cargarDashboard()

</script>

</body>
</html>
