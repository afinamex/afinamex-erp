<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Vehículos - ERP Afinamex</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
margin:0;
}

header{
background:#000;
color:white;
padding:20px;
font-size:22px;
}

.container{
padding:30px;
max-width:900px;
margin:auto;
}

input{
width:100%;
padding:10px;
margin-top:10px;
margin-bottom:15px;
border:1px solid #ccc;
}

button{
background:#000;
color:white;
padding:12px;
border:none;
cursor:pointer;
}

button:hover{
background:#333;
}

table{
width:100%;
border-collapse:collapse;
margin-top:30px;
background:white;
}

th,td{
padding:12px;
border-bottom:1px solid #ddd;
text-align:left;
}

th{
background:#222;
color:white;
}

</style>

</head>

<body>

<header>
ERP AFINAMEX | Registro de Vehículos
</header>

<div class="container">

<h2>Registrar Vehículo</h2>

<input id="unidad" type="text" placeholder="Número de unidad (TMX-2381)">
<input id="marca" type="text" placeholder="Marca (Nissan)">
<input id="modelo" type="text" placeholder="Modelo (NP300)">
<input id="anio" type="number" placeholder="Año (2022)">
<input id="placas" type="text" placeholder="Placas (ABC123)">

<button onclick="guardarVehiculo()">Guardar Vehículo</button>

<h2>Vehículos registrados</h2>

<table>

<thead>
<tr>
<th>Unidad</th>
<th>Marca</th>
<th>Modelo</th>
<th>Año</th>
<th>Placas</th>
</tr>
</thead>

<tbody id="tablaVehiculos"></tbody>

</table>

</div>

<script>

async function guardarVehiculo(){

const numero_unidad = document.getElementById("unidad").value
const marca = document.getElementById("marca").value
const modelo = document.getElementById("modelo").value
const anio = document.getElementById("anio").value
const placas = document.getElementById("placas").value

const respuesta = await fetch("http://localhost:3000/vehiculos",{

method:"POST",
headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
numero_unidad,
marca,
modelo,
anio,
placas
})

})

const data = await respuesta.json()

alert(data.mensaje)

limpiarFormulario()

cargarVehiculos()

}

function limpiarFormulario(){

document.getElementById("unidad").value=""
document.getElementById("marca").value=""
document.getElementById("modelo").value=""
document.getElementById("anio").value=""
document.getElementById("placas").value=""

}

async function cargarVehiculos(){

const respuesta = await fetch("http://localhost:3000/vehiculos")

const vehiculos = await respuesta.json()

const tabla = document.getElementById("tablaVehiculos")

tabla.innerHTML=""

vehiculos.forEach(v=>{

tabla.innerHTML += `
<tr>
<td>${v.numero_unidad}</td>
<td>${v.marca}</td>
<td>${v.modelo}</td>
<td>${v.anio}</td>
<td>${v.placas}</td>
</tr>
`

})

}

cargarVehiculos()

</script>

</body>
</html>
