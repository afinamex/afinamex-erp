<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Vehículos - ERP Afinamex</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
margin:0;
}

header{
background:#000;
color:white;
padding:20px;
font-size:22px;
}

.container{
padding:30px;
}

input{
width:100%;
padding:10px;
margin-top:10px;
margin-bottom:20px;
}

button{
background:#000;
color:white;
padding:12px;
border:none;
cursor:pointer;
}

button:hover{
background:#333;
}

</style>

</head>

<body>

<header>
Registro de Vehículos | ERP Afinamex
</header>

<div class="container">

<h2>Registrar vehículo</h2>

<label>Número de unidad</label>
<input id="unidad" type="text" placeholder="Ej: TMX-2381">

<label>Marca</label>
<input id="marca" type="text" placeholder="Nissan">

<label>Modelo</label>
<input id="modelo" type="text" placeholder="NP300">

<label>Año</label>
<input id="anio" type="number" placeholder="2022">

<label>Placas</label>
<input id="placas" type="text" placeholder="ABC-123">

<button onclick="guardarVehiculo()">Guardar Vehículo</button>

</div>

<script>

async function guardarVehiculo(){

const numero_unidad = document.getElementById("unidad").value
const marca = document.getElementById("marca").value
const modelo = document.getElementById("modelo").value
const anio = document.getElementById("anio").value
const placas = document.getElementById("placas").value

const respuesta = await fetch("http://localhost:3000/vehiculos",{

method:"POST",
headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
numero_unidad,
marca,
modelo,
anio,
placas
})

})

const data = await respuesta.json()

alert(data.mensaje)

}

</script>

</body>
</html>
