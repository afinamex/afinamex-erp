<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<title>Órdenes de Trabajo | ERP Afinamex</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
margin:0;
}

header{
background:black;
color:white;
padding:20px;
font-size:22px;
}

.container{
max-width:900px;
margin:auto;
padding:30px;
}

input,select{
width:100%;
padding:10px;
margin-bottom:15px;
border:1px solid #ccc;
}

button{
background:black;
color:white;
padding:12px;
border:none;
cursor:pointer;
}

button:hover{
background:#333;
}

table{
width:100%;
border-collapse:collapse;
margin-top:30px;
background:white;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:left;
}

th{
background:#222;
color:white;
}

</style>

</head>

<body>

<header>
ERP AFINAMEX | Órdenes de trabajo
</header>

<div class="container">

<h2>Nueva Orden</h2>

<label>Vehículo</label>
<select id="vehiculo"></select>

<label>Servicio</label>
<input id="servicio" placeholder="Ej: Afinación mayor">

<label>Costo</label>
<input id="costo" placeholder="3500">

<label>Estado</label>
<select id="estado">
<option value="Pendiente">Pendiente</option>
<option value="En proceso">En proceso</option>
<option value="Finalizado">Finalizado</option>
</select>

<button onclick="crearOrden()">Crear Orden</button>

<h2>Órdenes registradas</h2>

<table>

<thead>
<tr>
<th>Unidad</th>
<th>Servicio</th>
<th>Costo</th>
<th>Estado</th>
</tr>
</thead>

<tbody id="tablaOrdenes"></tbody>

</table>

</div>

<script>

async function cargarVehiculos(){

const res = await fetch("http://localhost:3000/vehiculos")
const vehiculos = await res.json()

const select = document.getElementById("vehiculo")

select.innerHTML=""

vehiculos.forEach(v=>{

select.innerHTML += `
<option value="${v.id}">
${v.numero_unidad} - ${v.marca}
</option>
`

})

}

async function crearOrden(){

const vehiculo_id = document.getElementById("vehiculo").value
const servicio = document.getElementById("servicio").value
const costo = document.getElementById("costo").value
const estado = document.getElementById("estado").value

await fetch("http://localhost:3000/ordenes",{

method:"POST",
headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
vehiculo_id,
servicio,
costo,
estado
})

})

document.getElementById("servicio").value=""
document.getElementById("costo").value=""

cargarOrdenes()

}

async function cargarOrdenes(){

const res = await fetch("http://localhost:3000/ordenes")
const ordenes = await res.json()

const tabla = document.getElementById("tablaOrdenes")

tabla.innerHTML=""

ordenes.forEach(o=>{

tabla.innerHTML += `
<tr>
<td>${o.numero_unidad}</td>
<td>${o.servicio}</td>
<td>$${o.costo}</td>
<td>${o.estado}</td>
</tr>
`

})

}

cargarVehiculos()
cargarOrdenes()

</script>

</body>

</html>
