<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<title>Inventario | ERP Afinamex</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
margin:0;
}

header{
background:black;
color:white;
padding:20px;
font-size:22px;
}

.container{
max-width:900px;
margin:auto;
padding:30px;
}

input{
width:100%;
padding:10px;
margin-bottom:15px;
border:1px solid #ccc;
}

button{
background:black;
color:white;
padding:12px;
border:none;
cursor:pointer;
}

button:hover{
background:#333;
}

table{
width:100%;
border-collapse:collapse;
margin-top:30px;
background:white;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
}

th{
background:#222;
color:white;
}

</style>

</head>

<body>

<header>
ERP AFINAMEX | Inventario
</header>

<div class="container">

<h2>Agregar producto</h2>

<input id="nombre" placeholder="Ej: Aceite 5W30">

<input id="stock" placeholder="Cantidad">

<input id="precio" placeholder="Precio">

<button onclick="guardarProducto()">Guardar</button>

<h2>Inventario</h2>

<table>

<thead>
<tr>
<th>Producto</th>
<th>Stock</th>
<th>Precio</th>
</tr>
</thead>

<tbody id="tablaInventario"></tbody>

</table>

</div>

<script>

async function guardarProducto(){

const nombre = document.getElementById("nombre").value
const stock = document.getElementById("stock").value
const precio = document.getElementById("precio").value

await fetch("http://localhost:3000/inventario",{

method:"POST",
headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
nombre,
stock,
precio
})

})

document.getElementById("nombre").value=""
document.getElementById("stock").value=""
document.getElementById("precio").value=""

cargarInventario()

}

async function cargarInventario(){

const res = await fetch("http://localhost:3000/inventario")
const productos = await res.json()

const tabla = document.getElementById("tablaInventario")

tabla.innerHTML=""

productos.forEach(p=>{

tabla.innerHTML += `
<tr>
<td>${p.nombre}</td>
<td>${p.stock}</td>
<td>$${p.precio}</td>
</tr>
`

})

}

cargarInventario()

</script>

</body>
</html>
